apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: keycloak
  namespace: keycloak
spec:
  interval: 5m
  chart:
    spec:
      chart: .
      sourceRef:
        kind: OCIRepository
        name: bitnami-keycloak
        namespace: flux-system
      interval: 1h
  values:
    auth:
      adminUser: admin
      adminPassword: admin
    service:
      type: ClusterIP
